[pytest]
addopts = --import-mode=importlib -m "not integration"
pythonpath =
    .
    domdata
testpaths =
    dominion_loader/tests
    dominion_ai/tests
    domdata/tests
    ragd_embed/tests
    ragd_hnsw/tests
    ragd_chunker/tests
    ragd_graph/tests
    ragd_vault/tests
    research_os/tests
    dominion_agent/tests
markers =
    integration: tests that require live local services
    requires_hnsw: tests that require hnswlib
    requires_treesitter: tests that require tree_sitter
